lock:
  description: Lock the vehicle.
  fields:
    vin:
      description: Vehicle VIN. Defaults to first vehicle when omitted.
      example: "KNxxxx..."
  target:
    entity:
      domain: lock
      integration: hyundai-connect

unlock:
  description: Unlock the vehicle.
  fields:
    vin:
      description: Vehicle VIN. Defaults to first vehicle when omitted.
      example: "KNxxxx..."
  target:
    entity:
      domain: lock
      integration: hyundai-connect

start_climate:
  description: Start remote climate control.
  fields:
    temperature:
      description: Target cabin temperature in Celsius.
      example: 21
    duration:
      description: Duration in minutes.
      example: 5
    defrost:
      description: Enable defrost.
      example: false
    climate:
      description: Enable HVAC climate mode.
      example: true
    heating:
      description: Additional heating level.
      example: 0
  target:
    entity:
      domain: climate
      integration: hyundai-connect

stop_climate:
  description: Stop remote climate control.
  target:
    entity:
      domain: climate
      integration: hyundai-connect

locate:
  description: Locate the vehicle.
  target:
    entity:
      domain: device_tracker
      integration: hyundai-connect

open_sunroof:
  description: Open the sunroof.
  target:
    entity:
      domain: binary_sensor
      integration: hyundai-connect

close_sunroof:
  description: Close the sunroof.
  target:
    entity:
      domain: binary_sensor
      integration: hyundai-connect

open_windows:
  description: Open windows by position.
  fields:
    front_left:
      description: Front left window.
      example: true
    front_right:
      description: Front right window.
      example: true
    back_left:
      description: Back left window.
      example: true
    back_right:
      description: Back right window.
      example: true
  target:
    entity:
      domain: binary_sensor
      integration: hyundai-connect

close_windows:
  description: Close windows by position.
  fields:
    front_left:
      description: Front left window.
      example: true
    front_right:
      description: Front right window.
      example: true
    back_left:
      description: Back left window.
      example: true
    back_right:
      description: Back right window.
      example: true
  target:
    entity:
      domain: binary_sensor
      integration: hyundai-connect

start_hazard_lights:
  description: Start hazard lights.
  target:
    entity:
      domain: binary_sensor
      integration: hyundai-connect

start_hazard_lights_and_horn:
  description: Start hazard lights and horn.
  target:
    entity:
      domain: binary_sensor
      integration: hyundai-connect

start_valet_mode:
  description: Start valet mode.
  target:
    entity:
      domain: binary_sensor
      integration: hyundai-connect

stop_valet_mode:
  description: Stop valet mode.
  target:
    entity:
      domain: binary_sensor
      integration: hyundai-connect
